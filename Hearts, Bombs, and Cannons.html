<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Album: Battle Mode</title>
    <style>
        :root {
            --wood: #3e2723;
            --p1-color: #e91e63;
            --p2-color: #2196f3;
            --go-green: #2ecc71;
        }

        body {
            margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #d7ccc8; height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; user-select: none;
        }

        #header {
            background: var(--wood); color: white; padding: 10px 25px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 100;
        }

        .btn {
            padding: 10px 20px; border: none; border-radius: 8px;
            cursor: pointer; font-weight: bold; font-size: 1.1rem; transition: 0.2s;
        }
        #edit-btn { background: #8d6e63; color: white; }
        #pause-btn { background: #f39c12; color: white; }

        #main {
            display: flex; flex: 1; padding: 15px; gap: 10px; align-items: center; justify-content: center;
            position: relative;
        }

        /* 1. Large Player Names & 2. Bigger Hearts */
        .player-zone {
            width: 220px; height: 92%; background: rgba(255,255,255,0.3);
            border-radius: 15px; border: 12px solid transparent;
            display: flex; flex-direction: column; align-items: center;
            padding: 10px; transition: 0.3s; box-sizing: border-box;
        }

        .player-name { font-size: 2.8rem; margin: 10px 0; font-weight: 900; }

        .heart-pool {
            display: flex; flex-direction: column; flex-wrap: wrap; 
            gap: 2px; justify-content: center; align-content: center;
            height: 80%; font-size: 4.5rem; /* Massive hearts */
        }

        /* 3. Blinking Green Highlight */
        .active-turn {
            border-color: var(--go-green) !important;
            background: white;
            animation: blinkGreen 1s infinite;
        }

        @keyframes blinkGreen {
            0% { box-shadow: 0 0 10px var(--go-green); }
            50% { box-shadow: 0 0 50px var(--go-green); }
            100% { box-shadow: 0 0 10px var(--go-green); }
        }

        #album-grid {
            flex: 1; display: grid; grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr); gap: 15px; 
            max-width: 850px; aspect-ratio: 1 / 1;
            transition: filter 0.3s;
        }

        /* 4. Pause Overlay Logic */
        #pause-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); display: none; 
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 500; border-radius: 20px;
        }

        .card { perspective: 1000px; cursor: pointer; width: 100%; aspect-ratio: 1 / 1; }
        .card-inner {
            width: 100%; height: 100%; transition: transform 0.6s;
            transform-style: preserve-3d; position: relative;
        }
        .card.flipped .card-inner { transform: rotateY(180deg); }

        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 6px;
            background: white; border: 10px solid white; 
            box-shadow: 4px 4px 12px rgba(0,0,0,0.2);
            box-sizing: border-box; display: flex; align-items: center; justify-content: center;
        }

        .card-front img { width: 100%; height: 100%; object-fit: cover; }
        .card-back { transform: rotateY(180deg); font-size: 5rem; }

        .pop-in { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { from { transform: scale(0); } to { transform: scale(1); } }

        .explode { animation: explodeOut 0.5s forwards; }
        @keyframes explodeOut {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(2); filter: brightness(1.5) grayscale(1); }
            100% { transform: scale(0); opacity: 0; }
        }

        #modal-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.8); display: none; 
            justify-content: center; align-items: center; z-index: 2000;
        }
        .modal { background: white; padding: 40px; border-radius: 20px; width: 450px; }

        #winner-screen {
            position: fixed; top: 0; left:0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); color: white; display: none;
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 3000; font-size: 5rem;
        }
    </style>
</head>
<body>

    <div id="header">
        <div style="font-weight:bold; font-size: 1.5rem;">📸 PHOTO ALBUM BATTLE</div>
        <div style="display:flex; gap:10px;">
            <button id="pause-btn" class="btn" onclick="togglePause()">PAUSE GAME</button>
            <button id="edit-btn" class="btn" onclick="openEdit()">EDIT PHOTOS</button>
        </div>
    </div>

    <div id="main">
        <div id="p1-zone" class="player-zone">
            <div class="player-name" style="color:var(--p1-color)">P1</div>
            <div id="p1-hearts" class="heart-pool"></div>
        </div>

        <div id="album-grid"></div>

        <div id="p2-zone" class="player-zone">
            <div class="player-name" style="color:var(--p2-color)">P2</div>
            <div id="p2-hearts" class="heart-pool"></div>
        </div>

        <div id="pause-overlay">
            <button class="btn" style="font-size: 3rem; background: var(--go-green); color:white; padding: 20px 60px;" onclick="togglePause()">RESUME</button>
            <p style="color:white; font-size: 1.5rem; margin-top:20px;">Game Paused</p>
        </div>
    </div>

    <div id="winner-screen">
        <div id="win-text"></div>
        <button class="btn" style="margin-top:20px; font-size: 2rem; background: var(--go-green); color:white;" onclick="initGame()">PLAY AGAIN</button>
    </div>

    <div id="modal-overlay">
        <div class="modal">
            <h2>Update Album</h2>
            <p>Select 5-10 local photos:</p>
            <input type="file" id="file-input" multiple accept="image/*" onchange="previewFiles()" style="margin:10px 0;">
            <div id="file-count" style="margin: 15px 0; font-weight: bold;">0 images selected.</div>
            <button class="btn" style="background:#2196f3; color:white; width: 100%;" onclick="savePhotos()">SAVE & RESTART</button>
            <button class="btn" style="background:#ddd; width: 100%; margin-top:10px;" onclick="closeEdit()">CANCEL</button>
        </div>
    </div>

<script>
    const gProxy = (id) => `https://drive.google.com/uc?export=view&id=${id}`;

    let activePhotos = [
        '1CNsPNsMcm8Wpy_BqSI9ee5nf7AgjlHAy', '1LJo9ZLa_v0bgkLc31FSGPfJ9KZRee-v9',
        '1cNp1RR82S3wO9U2uwg4sFyAHYbzilylb', '1ifMU_F62iq-QVUjS0dsiNmVR2YSwO7OV',
        '1llJSRy2h9wwgkazaRMs49011cUIosvQS', '1yT0bRyPwdpCqeB29hFlonPZZ4InQSckT'
    ].map(id => gProxy(id));

    let state = { p1: 5, p2: 5, turn: 1, flipped: 0, busy: false, isPaused: false };

    function initGame() {
        state = { p1: 5, p2: 5, turn: 1, flipped: 0, busy: false, isPaused: false };
        document.getElementById('winner-screen').style.display = 'none';
        document.getElementById('pause-overlay').style.display = 'none';
        document.getElementById('album-grid').style.filter = 'none';
        renderHearts();
        updateTurnUI();
        buildBoard();
    }

    function togglePause() {
        state.isPaused = !state.isPaused;
        const overlay = document.getElementById('pause-overlay');
        const grid = document.getElementById('album-grid');
        if(state.isPaused) {
            overlay.style.display = 'flex';
            grid.style.filter = 'grayscale(1) blur(5px)';
        } else {
            overlay.style.display = 'none';
            grid.style.filter = 'none';
        }
    }

    function buildBoard() {
        const grid = document.getElementById('album-grid');
        grid.innerHTML = '';
        let pool = [...Array(6).fill('❤️'), ...Array(5).fill('💣'), ...Array(5).fill('🚀')];
        pool.sort(() => Math.random() - 0.5);

        for(let i=0; i<16; i++) {
            const type = pool[i];
            const photo = activePhotos[i % activePhotos.length];
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-inner">
                    <div class="card-front"><img src="${photo}"></div>
                    <div class="card-back">${type}</div>
                </div>
            `;
            card.onclick = () => { if(!state.isPaused) handleFlip(card, type); };
            grid.appendChild(card);
        }
    }

    function handleFlip(card, type) {
        if (state.busy || card.classList.contains('flipped')) return;
        state.busy = true;
        card.classList.add('flipped');
        state.flipped++;

        setTimeout(() => {
            if (type === '❤️') state[`p${state.turn}`]++;
            else if (type === '💣') { animateLoss(state.turn); state[`p${state.turn}`] = Math.max(0, state[`p${state.turn}`] - 1); }
            else if (type === '🚀') { const opp = state.turn === 1 ? 2 : 1; animateLoss(opp); state[`p${opp}`] = Math.max(0, state[`p${opp}`] - 1); }
            
            renderHearts();
            if (state.flipped === 16) showWinner();
            else { state.turn = state.turn === 1 ? 2 : 1; updateTurnUI(); state.busy = false; }
        }, 700);
    }

    function animateLoss(pNum) {
        const container = document.getElementById(`p${pNum}-hearts`);
        if (container.lastChild) container.lastChild.classList.add('explode');
    }

    function renderHearts() {
        ['p1', 'p2'].forEach(p => {
            const container = document.getElementById(`${p}-hearts`);
            container.innerHTML = '';
            for(let i=0; i < state[p]; i++) {
                const h = document.createElement('span');
                h.className = 'pop-in';
                h.innerText = '❤️';
                container.appendChild(h);
            }
        });
    }

    function updateTurnUI() {
        document.getElementById('p1-zone').classList.toggle('active-turn', state.turn === 1);
        document.getElementById('p2-zone').classList.toggle('active-turn', state.turn === 2);
    }

    function showWinner() {
        const winDiv = document.getElementById('winner-screen');
        winDiv.style.display = 'flex';
        const txt = state.p1 > state.p2 ? "PLAYER 1 WINS!" : (state.p2 > state.p1 ? "PLAYER 2 WINS!" : "DRAW!");
        document.getElementById('win-text').innerText = txt;
    }

    function openEdit() { document.getElementById('modal-overlay').style.display = 'flex'; }
    function closeEdit() { document.getElementById('modal-overlay').style.display = 'none'; }
    function previewFiles() { document.getElementById('file-count').innerText = `${document.getElementById('file-input').files.length} images selected.`; }

    async function savePhotos() {
        const files = document.getElementById('file-input').files;
        if (files.length < 5 || files.length > 10) { alert("Please select between 5 and 10 photos."); return; }
        const newPhotos = [];
        for (let file of files) {
            const res = await new Promise(r => { const reader = new FileReader(); reader.onload = e => r(e.target.result); reader.readAsDataURL(file); });
            newPhotos.push(res);
        }
        activePhotos = newPhotos;
        closeEdit();
        initGame();
    }
    window.onload = initGame;
</script>
</body>
</html>
